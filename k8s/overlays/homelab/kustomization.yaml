apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authorworks

resources:
  - ../../base-minimal
  - sealed-secrets.yaml
  - ghcr-sealed-secret.yaml
  - content-worker.yaml

labels:
  - pairs:
      environment: homelab

# Image tags are managed by ArgoCD Image Updater (write-back-method: argocd).
# The newTag fields below are bootstrap values pinned to the HEAD commit at the
# time this overlay was last refreshed. Image Updater patches
# `spec.source.kustomize.images` on the live Application whenever a newer
# `sha-<commit>` tag appears in GHCR, so the values here drift only as the
# repo bootstrap baseline.
images:
  - name: ghcr.io/authorworks/frontend
    newTag: sha-e4de8b6
  - name: ghcr.io/authorworks/book-generator
    newTag: sha-e4de8b6
  - name: ghcr.io/authorworks/content-worker
    newTag: sha-e4de8b6
