# Root Application - App of Apps pattern.
#
# Apply this manually (kubectl apply -f k8s/argocd/app-of-apps.yaml).
# It points at k8s/argocd (kustomization.yaml -> applicationset.yaml) which
# generates the per-environment Applications. Excluded from the kustomization
# itself so it doesn't try to reconcile its own definition.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authorworks-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab

  source:
    repoURL: https://github.com/AuthorWorks/authorworks.git
    targetRevision: main
    path: k8s/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
